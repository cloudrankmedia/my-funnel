<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Oklahoma City rooftops at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3a63"/>
      <stop offset="52%" stop-color="#3b2d43"/>
      <stop offset="100%" stop-color="#5c3020"/>
    </linearGradient>
    <radialGradient id="sun" cx="76%" cy="24%" r="46%">
      <stop offset="0%" stop-color="#F47A36" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#E8500A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8500A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>
  <rect width="1440" height="900" fill="url(#sun)"/>

  <!-- distant rooftops -->
  <g fill="#2a3555" opacity="0.75">
    <polygon points="-40,650 150,548 340,650 340,900 -40,900"/>
    <polygon points="300,672 470,576 640,672 640,900 300,900"/>
    <polygon points="620,640 820,532 1020,640 1020,900 620,900"/>
    <polygon points="980,676 1150,584 1320,676 1320,900 980,900"/>
    <polygon points="1260,652 1430,560 1480,588 1480,900 1260,900"/>
  </g>

  <!-- near rooftops -->
  <g fill="#1b2338">
    <polygon points="-40,760 220,624 480,760 480,900 -40,900"/>
    <polygon points="430,786 690,648 950,786 950,900 430,900"/>
    <polygon points="900,764 1160,628 1420,764 1480,764 1480,900 900,900"/>
    <!-- ridge lines / chimneys for detail -->
    <rect x="150" y="648" width="34" height="70" fill="#1b2338"/>
    <rect x="612" y="672" width="34" height="70" fill="#1b2338"/>
    <rect x="1088" y="652" width="34" height="70" fill="#1b2338"/>
  </g>

  <!-- subtle shingle texture on the nearest roof -->
  <g stroke="#26304a" stroke-width="2" opacity="0.5">
    <line x1="40" y1="784" x2="440" y2="784"/>
    <line x1="70" y1="812" x2="410" y2="812"/>
    <line x1="100" y1="840" x2="380" y2="840"/>
  </g>
</svg>
